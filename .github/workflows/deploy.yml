name: Build GHCR and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/imamrzkyy/weding-planner
  DEPLOY_PATH: /home/ubuntu/sewa/wedding-planner

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Auto create Dockerfile if not exists
        run: |
          if [ ! -f Dockerfile ]; then
            printf '%s\n' \
              'FROM php:8.3-apache' \
              '' \
              'RUN docker-php-ext-install mysqli pdo pdo_mysql' \
              '' \
              'RUN a2enmod rewrite' \
              '' \
              'COPY . /var/www/html/' \
              '' \
              'RUN chown -R www-data:www-data /var/www/html' \
              > Dockerfile
          fi

      - name: Login to GHCR for build push
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install sshpass
        run: |
          sudo apt update
          sudo apt install sshpass -y

      - name: Deploy to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}

          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

          APP_PORT: ${{ secrets.APP_PORT }}

          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}

          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}

          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          CLOUDFLARED_TOKEN: ${{ secrets.CLOUDFLARED_TOKEN }}

        run: |
          PORT="${SERVER_PORT:-22}"

          sshpass -p "$SERVER_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            -p "$PORT" \
            "$SERVER_USER@$SERVER_HOST" \
            IMAGE_NAME="$IMAGE_NAME" \
            DEPLOY_PATH="$DEPLOY_PATH" \
            APP_PORT="${APP_PORT:-8080}" \
            GHCR_USERNAME="$GHCR_USERNAME" \
            GHCR_PAT="$GHCR_PAT" \
            MYSQL_DATABASE="${MYSQL_DATABASE:-wo_web}" \
            MYSQL_USER="${MYSQL_USER:-wo_user}" \
            MYSQL_PASSWORD="$MYSQL_PASSWORD" \
            NVIDIA_API_KEY="$NVIDIA_API_KEY" \
            CLOUDFLARED_TOKEN="$CLOUDFLARED_TOKEN" \
            'bash -s' <<'REMOTE'
          set -e

          mkdir -p "$DEPLOY_PATH"
          cd "$DEPLOY_PATH"

          docker network inspect db-shared >/dev/null 2>&1 || docker network create db-shared

          cat > .env <<ENVFILE
          IMAGE_NAME=${IMAGE_NAME}:latest
          APP_PORT=${APP_PORT}

          MYSQL_DATABASE=${MYSQL_DATABASE}
          MYSQL_USER=${MYSQL_USER}
          MYSQL_PASSWORD=${MYSQL_PASSWORD}

          NVIDIA_API_KEY=${NVIDIA_API_KEY}

          CLOUDFLARED_TOKEN=${CLOUDFLARED_TOKEN}
          ENVFILE

          chmod 600 .env

          cat > docker-compose.yml <<'COMPOSEFILE'
          services:
            app:
              image: ${IMAGE_NAME}
              container_name: wedding-planner-app
              ports:
                - "${APP_PORT:-8080}:80"
              environment:
                DB_HOST: infra-mysql
                DB_PORT: 3306
                DB_DATABASE: ${MYSQL_DATABASE}
                DB_USERNAME: ${MYSQL_USER}
                DB_PASSWORD: ${MYSQL_PASSWORD}
                NVIDIA_API_KEY: ${NVIDIA_API_KEY}
              restart: unless-stopped
              networks:
                - wedding-planner-network
                - db-shared

            cloudflared:
              image: cloudflare/cloudflared:latest
              container_name: wedding-planner-cloudflared
              command: ["tunnel", "--no-autoupdate", "run", "--token", "${CLOUDFLARED_TOKEN}"]
              depends_on:
                - app
              restart: unless-stopped
              networks:
                - wedding-planner-network

          networks:
            wedding-planner-network:
              driver: bridge
            db-shared:
              external: true
              name: db-shared
          COMPOSEFILE

          docker compose config >/dev/null

          if [ -n "$GHCR_PAT" ]; then
            echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          fi

          docker compose pull
          docker compose up -d --remove-orphans
          docker image prune -f
          REMOTE