services:
  app:
    image: ${IMAGE_NAME}
    container_name: wedding-planner-app
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      DB_HOST: infra-mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE}
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    restart: unless-stopped
    networks:
      - wedding-planner-network
      - db-shared

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: wedding-planner-cloudflared
    command: ["tunnel", "--no-autoupdate", "run", "--token", "${CLOUDFLARED_TOKEN}"]
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - wedding-planner-network

networks:
  wedding-planner-network:
    driver: bridge
  db-shared:
    external: true
    name: db-shared